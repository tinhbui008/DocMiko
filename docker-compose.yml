# ============================================================
# Mikotech PDF Translator - CLI batch runner (100% local, Ollama)
# Server data dirs (already created):
#   /root/pdf-translator/input    -> source PDFs go here
#   /root/pdf-translator/output   -> translated PDFs come out here
#   /root/pdf-translator/cache    -> persistent translation cache
#
# Translation runs on a local **ollama** container (no external API, free).
# First-time setup (pull the model once, ~9GB):
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull qwen2.5:14b
#
# Usage:
#   docker compose build
#   docker compose run --rm translator        # v28.2 region pipeline (no LLM)
#   docker compose run --rm text-translate     # text-layer translate via ollama
# ============================================================

# Shared config reused by both app services (YAML anchor)
x-common: &common
  build: .
  image: mikotech-pdf-translator:latest
  env_file:
    - .env                                       # LLM_PROVIDER, LLM_MODEL, ...
  environment:
    # Inside the compose network the app reaches ollama by service name,
    # overriding the localhost URL used for host-side dev in .env.
    - LLM_BASE_URL=http://ollama:11434/v1
  volumes:
    - /root/pdf-translator/input:/app/input      # drop source PDFs here
    - /root/pdf-translator/output:/app/output    # translated PDFs appear here
    - /root/pdf-translator/cache:/app/cache      # persistent translation cache
  depends_on:
    - ollama
  restart: "no"

services:
  # Local LLM backend — translation + (via RapidOCR) Track B text
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama              # pulled models persist here
    ports:
      - "11434:11434"
    restart: unless-stopped
    # For NVIDIA GPU, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # v28.2 region patch pipeline - does NOT call the LLM
  translator:
    <<: *common

  # text-layer + image translation via local ollama
  text-translate:
    <<: *common
    entrypoint: ["/bin/bash", "run_text_translate.sh"]

volumes:
  ollama-models:
