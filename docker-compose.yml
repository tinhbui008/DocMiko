# ============================================================
# Mikotech PDF Translator - CLI batch runner
# Server data dirs (already created):
#   /root/pdf-translator/input    -> source PDFs go here
#   /root/pdf-translator/output   -> translated PDFs come out here
#
# Usage (run from the cloned repo folder):
#   docker compose build
#   cp <your.pdf> /root/pdf-translator/input/input.pdf
#   docker compose run --rm translator
#   # or override file names:
#   docker compose run --rm translator /app/input/myfile.pdf /app/output/done.pdf
# ============================================================
services:
  translator:
    build: .
    image: mikotech-pdf-translator:latest
    env_file:
      - .env                                   # LLM_API_KEY, LLM_BASE_URL, LLM_MODEL, ...
    volumes:
      - /root/pdf-translator/input:/app/input    # drop source PDFs here
      - /root/pdf-translator/output:/app/output  # translated PDFs appear here
    # CLI batch job: run once and exit
    restart: "no"
